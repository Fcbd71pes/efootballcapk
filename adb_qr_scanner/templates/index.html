<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireless ADB QR Scanner</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape1"></div>
        <div class="shape shape2"></div>
        <div class="shape shape3"></div>
    </div>
    
    <div class="glass-container">
        <header>
            <h1>Wireless ADB Scanner</h1>
            <p>Scan the QR code from your phone's Developer Options</p>
        </header>

        <main>
            <div id="qr-container" class="qr-container loading">
                <div class="spinner"></div>
                <img id="qr-code" src="" alt="ADB Pairing QR Code" style="display: none;">
                <div class="scanner-line" style="display: none;"></div>
            </div>
            
            <div id="status-card" class="status-card">
                <div class="status-icon" id="status-icon">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="css-i6dzq1"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                </div>
                <div class="status-text">
                    <h3>Status</h3>
                    <p id="status-message">Waiting for connection...</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetch('/qr')
                .then(response => response.json())
                .then(data => {
                    const qrImg = document.getElementById('qr-code');
                    const spinner = document.querySelector('.spinner');
                    const scannerLine = document.querySelector('.scanner-line');
                    
                    qrImg.src = data.qr_image;
                    
                    qrImg.onload = () => {
                        spinner.style.display = 'none';
                        qrImg.style.display = 'block';
                        scannerLine.style.display = 'block';
                        document.getElementById('qr-container').classList.remove('loading');
                    };
                })
                .catch(err => console.error("Error loading QR:", err));

            // Poll for status
            const statusMessage = document.getElementById('status-message');
            const statusCard = document.getElementById('status-card');
            const statusIcon = document.getElementById('status-icon');

            const interval = setInterval(() => {
                fetch('/status')
                    .then(res => res.json())
                    .then(data => {
                        if(data.paired) {
                            clearInterval(interval);
                            
                            statusCard.classList.add('success');
                            statusMessage.innerText = data.message;
                            statusIcon.innerHTML = `<svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="css-i6dzq1"><path d="M22 11.08V12a10 10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`;
                            
                            document.getElementById('qr-container').classList.add('success-anim');
                        }
                    });
            }, 1000);
        });
    </script>
</body>
</html>
