<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>eFootball Mini App</title>
    <!-- Telegram WebApp JS -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #1a1b1e);
            color: var(--tg-theme-text-color, #ffffff);
            margin: 0;
            padding: 16px;
        }
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        .header h1 {
            font-size: 24px;
            margin: 0;
            color: var(--tg-theme-text-color, #fff);
        }
        .card {
            background-color: var(--tg-theme-secondary-bg-color, #2c2d30);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .card h3 {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 16px;
            color: var(--tg-theme-hint-color, #a0a0a0);
        }
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .stat-item {
            text-align: center;
            background-color: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 8px;
        }
        .stat-value {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 4px;
            color: var(--tg-theme-button-color, #3390ec);
        }
        .stat-label {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #a0a0a0);
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #fff);
            text-align: center;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
        }
        .btn:active {
            opacity: 0.8;
        }
        .tournament-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .tournament-item {
            background-color: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .tournament-title {
            font-weight: bold;
            margin-bottom: 4px;
        }
        .tournament-details {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #a0a0a0);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>eFootball Arena</h1>
        <p id="greeting" style="color: var(--tg-theme-hint-color, #a0a0a0); margin-top: 4px;">Welcome</p>
    </div>

    <div class="card">
        <h3>My Profile</h3>
        <div class="stat-grid">
            <div class="stat-item">
                <div class="stat-value" id="val_balance">0 TK</div>
                <div class="stat-label">Balance</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="val_rating">1200</div>
                <div class="stat-label">Rating</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="val_matches">0</div>
                <div class="stat-label">Matches</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="val_wins">0</div>
                <div class="stat-label">Wins</div>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>Active Tournaments</h3>
        <ul class="tournament-list" id="tournament_list">
            <li class="tournament-item" style="text-align: center; color: var(--tg-theme-hint-color, #a0a0a0);">Loading...</li>
        </ul>
    </div>

    <button class="btn" onclick="closeApp()">Close App</button>

    <script>
        // Initialize Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // Open in full screen

        // Set theme colors (if user changes theme in TG, WebApp adapts)
        document.documentElement.style.setProperty('--tg-theme-bg-color', tg.themeParams.bg_color);
        document.documentElement.style.setProperty('--tg-theme-text-color', tg.themeParams.text_color);
        document.documentElement.style.setProperty('--tg-theme-hint-color', tg.themeParams.hint_color);
        document.documentElement.style.setProperty('--tg-theme-secondary-bg-color', tg.themeParams.secondary_bg_color);
        document.documentElement.style.setProperty('--tg-theme-button-color', tg.themeParams.button_color);
        document.documentElement.style.setProperty('--tg-theme-button-text-color', tg.themeParams.button_text_color);

        const user = tg.initDataUnsafe?.user;
        let userId = 123456789; // Default fallback for local testing
        if (user) {
            userId = user.id;
            document.getElementById('greeting').innerText = "Welcome, " + user.first_name;
        }

        // Fetch User Data
        fetch('/api/webapp/user/' + userId)
            .then(res => res.json())
            .then(data => {
                if (data.user_id) {
                    document.getElementById('val_balance').innerText = data.balance + " TK";
                    document.getElementById('val_rating').innerText = data.rating;
                    document.getElementById('val_matches').innerText = data.total_matches;
                    document.getElementById('val_wins').innerText = data.matches_won;
                    if (data.ingame_name) {
                        document.getElementById('greeting').innerText = "IGN: " + data.ingame_name;
                    }
                } else {
                    document.getElementById('greeting').innerText = "User not registered in bot.";
                }
            })
            .catch(err => console.error(err));

        // Fetch Tournaments
        fetch('/api/webapp/tournaments')
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('tournament_list');
                list.innerHTML = '';
                if (data && data.length > 0) {
                    data.forEach(t => {
                        const li = document.createElement('li');
                        li.className = 'tournament-item';
                        li.innerHTML = `
                            <div class="tournament-title">${t.name}</div>
                            <div class="tournament-details">Entry: ${t.entry_fee} TK | Prize: ${t.prize_pool} TK | Slots: ${t.slots}</div>
                        `;
                        list.appendChild(li);
                    });
                } else {
                    list.innerHTML = '<li class="tournament-item" style="text-align: center; color: var(--tg-theme-hint-color, #a0a0a0);">No open tournaments right now.</li>';
                }
            })
            .catch(err => console.error(err));

        function closeApp() {
            tg.close();
        }
    </script>
</body>
</html>
